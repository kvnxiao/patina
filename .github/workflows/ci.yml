# Patina CI.
#
# Operator note: the cross-platform parity gate is the `test`
# matrix job below. To enforce "macOS, Linux, Windows are first-class;
# two-of-three is not done", add ALL THREE of these check names to the
# required-status-checks set for the `main` branch in the repository's
# branch-protection settings:
#
#   - Test (ubuntu-latest)
#   - Test (macos-latest)
#   - Test (windows-latest)
#
# With those three required, a regression that fails on only one OS (a
# Windows long-path case, a Linux-only `#[cfg(target_os = ...)]` panic)
# blocks merge into `main`. Branch protection is administered on GitHub
# and is not expressible in this file; this comment is the contract.
#
# Supply-chain gate: the `deny` job below runs `cargo deny
# check` (licences, advisories, bans, sources) against the root
# `deny.toml`. Add its check name to the same required-status-checks set
# so a licence / advisory / bans / sources violation blocks merge into
# `main`:
#
#   - Cargo deny
#
# A PR that adds, for example, a `GPL-3.0`-licensed dependency to
# `Cargo.toml` fails the `licenses` check and, with this name required,
# is blocked from merging.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Nightly rustfmt is required because `.rustfmt.toml` uses unstable
      # options (group_imports, imports_granularity, etc.). Pin to a specific
      # nightly date if rolling-nightly regressions become a problem.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  # Cross-platform lint gate. Clippy runs natively on each OS runner so every
  # `#[cfg(...)]`-gated path is type-checked and linted on its real target —
  # the MSVC Windows target, not a `gnu` proxy, and the macOS target with its
  # native toolchain (`notify-rust` -> `mac-notification-sys` compiles
  # Objective-C in a build script, so it cannot be cross-compiled from Linux).
  # This is a dedicated fast lane: a `cfg(windows)` / `cfg(target_os = "macos")`
  # lint or compile error fails here without waiting for that OS's full `Test`
  # suite to run first. `--locked` also catches lockfile drift. `fail-fast:
  # false` so every OS reports independently. Mirrored locally by `just
  # lint-clippy`, which cross-compiles the non-host targets (the only way to
  # catch another OS's `cfg` code from a single dev machine).
  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  # Cross-platform parity gate. Each OS runs the workspace test
  # suite with `--locked` so a lockfile drift or an OS-specific regression
  # fails that OS's job and blocks merge. Clippy is a separate per-OS job
  # above. `fail-fast: false` ensures all three OSes report independently
  # rather than the first failure cancelling the others.
  #
  # Linux folds coverage into this gate: instead of a plain `cargo test`,
  # ubuntu runs the suite under `cargo llvm-cov` (all-features, instrumented)
  # and uploads lcov to codecov. That single instrumented run doubles as
  # Linux's functional gate, so there is no separate `coverage` job re-running
  # the whole suite. macOS and Windows stay on a plain, uninstrumented `cargo
  # test`, preserving a clean signal for the timing-sensitive crash/journal
  # tests. Coverage is informational only (`--fail-under-lines 0`,
  # `fail_ci_if_error: false`) and never blocks merge.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: ${{ matrix.os == 'ubuntu-latest' && 'llvm-tools-preview' || '' }}
      - uses: Swatinem/rust-cache@v2
      - if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - if: matrix.os == 'ubuntu-latest'
        run: cargo llvm-cov --workspace --all-features --locked --fail-under-lines 0 --lcov --output-path lcov.info
      - if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          # codecov outages shouldn't block CI; the --fail-under-lines gate
          # above is the authoritative coverage check.
          fail_ci_if_error: false
      - if: matrix.os != 'ubuntu-latest'
        run: cargo test --workspace --locked

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  msrv:
    name: MSRV (Rust 1.95)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features

  deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
